workspace:
  root: ./workspace
  default_protocol: legacy-default

server:
  host: 0.0.0.0
  port: 18000
  cors:
    enabled: true
    allow_origins:
      - http://127.0.0.1:5173
      - http://localhost:5173
      - http://192.168.18.140:5173
    allow_origin_regex: null
    allow_credentials: true
    allow_methods:
      - GET
      - POST
      - PATCH
      - OPTIONS
    allow_headers:
      - Authorization
      - Content-Type
      - X-Operation-Id
    expose_headers: []
    max_age: 3600

llm:
  provider: openai-compatible
  base_url: https://api.vectorengine.ai/v1
  api_key: ""
  api_key_env: FUZZ_CORE_LLM_API_KEY
  model: gpt-5.4
  models:
    protocol_extract: gpt-5.4
    risk_analysis: gpt-5.4
    seed_generation: gpt-5.4
    debug_reasoning: gpt-5.4
  timeout_sec: 120

paths:
  afl_fuzz: afl-fuzz
  afl_showmap: afl-showmap
  preeny_desock: /home/zyl/preeny/src/desock.so

debugger:
  gdb_path: gdb
  timeout_sec: 20
  allow_network_replay: false
